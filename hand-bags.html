    <!-- Hero Section -->
    <section class="relative w-full h-[250px] md:h-[400px] overflow-hidden bg-[#A38162]">
        <img src="images/3.jpg" alt="Hero Background" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-multiply">
        
        <div class="relative z-10 h-full flex flex-col justify-center px-6 md:px-16 lg:px-24">
            <p class="text-white text-sm md:text-lg font-medium opacity-90 mb-2"><a href="index.html" class="hover:underline">Home</a> / Collections / Hand Bags</p>
            <h1 class="text-white text-4xl md:text-6xl font-bold tracking-wide">Hand Bags</h1>
        </div>
    </section>

    <!-- Categories Strip -->
    <div class="w-full py-8 md:py-10 px-4 flex justify-start lg:justify-center items-center overflow-x-auto no-scrollbar space-x-2 md:space-x-4 bg-white border-b border-gray-100">
        <!-- Reusable block for each category -->
        <div class="flex flex-col items-center group cursor-pointer min-w-[80px] md:min-w-[100px] shrink-0" onclick="document.getElementById('category-filter').value='crossbody'; renderGrid();">
            <div class="w-16 h-16 md:w-[85px] md:h-[85px] bg-[#F7F7F7] flex items-center justify-center p-2 mb-3 transition-colors group-hover:bg-[#EAEAEA]">
                <img src="images/4.jpg" class="w-full h-full object-cover mix-blend-multiply group-hover:scale-110 transition-transform">
            </div>
            <span class="text-[9px] md:text-[10px] font-bold tracking-wide text-center uppercase text-black">Cross Body Bags</span>
        </div>
        <div class="flex flex-col items-center group cursor-pointer min-w-[80px] md:min-w-[100px] shrink-0" onclick="document.getElementById('category-filter').value='handbag'; renderGrid();">
            <div class="w-16 h-16 md:w-[85px] md:h-[85px] bg-[#F7F7F7] flex items-center justify-center p-2 mb-3 transition-colors group-hover:bg-[#EAEAEA]">
                <img src="images/5.jpg" class="w-full h-full object-cover mix-blend-multiply group-hover:scale-110 transition-transform">
            </div>
            <span class="text-[9px] md:text-[10px] font-bold tracking-wide text-center uppercase text-black">Hand Bags</span>
        </div>
        <div class="flex flex-col items-center group cursor-pointer min-w-[80px] md:min-w-[100px] shrink-0" onclick="document.getElementById('category-filter').value='shoulder'; renderGrid();">
            <div class="w-16 h-16 md:w-[85px] md:h-[85px] bg-[#F7F7F7] flex items-center justify-center p-2 mb-3 transition-colors group-hover:bg-[#EAEAEA]">
                <img src="images/6.jpg" class="w-full h-full object-cover mix-blend-multiply group-hover:scale-110 transition-transform">
            </div>
            <span class="text-[9px] md:text-[10px] font-bold tracking-wide text-center uppercase text-black border-b-2 border-transparent group-hover:border-black pb-0.5 transition-colors">Shoulder Bags</span>
        </div>
        <div class="flex flex-col items-center group cursor-pointer min-w-[80px] md:min-w-[100px] shrink-0" onclick="document.getElementById('category-filter').value='tote'; renderGrid();">
            <div class="w-16 h-16 md:w-[85px] md:h-[85px] bg-[#F7F7F7] flex items-center justify-center p-2 mb-3 transition-colors group-hover:bg-[#EAEAEA]">
                <img src="images/8.jpg" class="w-full h-full object-cover mix-blend-multiply group-hover:scale-110 transition-transform">
            </div>
            <span class="text-[9px] md:text-[10px] font-bold tracking-wide text-center uppercase text-black">Tote Bags</span>
        </div>
    </div>

    <!-- Filter & Sort Bar -->
    <div class="w-full px-4 md:px-8 py-4 flex justify-between items-center bg-white border-b border-gray-100 mb-6 flex-wrap gap-4">
        <div class="flex items-center space-x-4">
            <button class="flex items-center space-x-2 text-xs font-bold px-4 py-2 hover:bg-gray-50 transition-colors rounded-sm shadow-sm border border-gray-200">
                <i class="fas fa-sliders-h"></i>
                <span>FILTER</span>
            </button>
            <div class="hidden sm:flex items-center border border-gray-200 px-3 py-2 hover:border-black transition-colors rounded-sm cursor-pointer relative min-w-[160px]">
                <select id="category-filter" onchange="renderGrid()" class="w-full text-xs text-gray-700 outline-none cursor-pointer bg-transparent appearance-none pr-6 font-semibold">
                    <option value="all">All Categories</option>
                    <option value="handbag">Hand Bags</option>
                    <option value="shoulder">Shoulder Bags</option>
                    <option value="tote">Tote Bags</option>
                    <option value="crossbody">Cross Body Bags</option>
                </select>
                <i class="fas fa-chevron-down text-[10px] absolute right-3 pointer-events-none text-gray-400"></i>
            </div>
        </div>
        <div class="flex items-center border border-gray-200 px-3 py-2 hover:border-black transition-colors rounded-sm cursor-pointer relative min-w-[140px]">
            <select class="w-full text-xs text-gray-700 outline-none cursor-pointer bg-transparent appearance-none pr-6">
                <option>Featured</option>
                <option>Best Selling</option>
                <option>Alphabetically, A-Z</option>
                <option>Price, low to high</option>
            </select>
            <i class="fas fa-chevron-down text-[10px] absolute right-3 pointer-events-none text-gray-400"></i>
        </div>
    </div>

    <!-- Product Grid -->
    <section class="w-full px-4 md:px-8 pb-12 relative">
        <!-- Floating WhatsApp -->
        <a href="#" class="fixed right-6 bottom-6 w-[52px] h-[52px] bg-[#25D366] text-white rounded-full flex items-center justify-center text-3xl shadow-xl z-50 hover:scale-110 transition-transform">
            <i class="fab fa-whatsapp"></i>
        </a>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-5">
            <!-- Dynamic products will load here -->
        </div>

        <!-- Load More Button -->
        <div class="w-full flex justify-center mt-12 mb-8">
            <button class="border border-gray-300 text-gray-800 px-10 py-3 text-[11px] font-semibold tracking-widest hover:border-black hover:bg-black hover:text-white transition-all rounded-sm">Load more</button>
        </div>
    </section>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-20 right-6 bg-[#111] text-white px-6 py-3.5 rounded-sm text-[13px] font-semibold tracking-wide opacity-0 translate-y-4 transition-all z-[999] flex items-center gap-3 pointer-events-none">
        <i class="fas fa-check-circle text-green-400"></i><span id="toast-msg">Added!</span>
    </div>

    <script>
        // ---- SANITY CONFIG ----
        const SANITY_PROJECT_ID = '8uqf5doi';
        const SANITY_DATASET = 'production';
        const SANITY_API_VERSION = '2023-05-03';

        async function sanityFetch(query) {
            const url = `https://${SANITY_PROJECT_ID}.apicdn.sanity.io/v${SANITY_API_VERSION}/data/query/${SANITY_DATASET}?query=${encodeURIComponent(query)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Sanity fetch failed: ' + res.status);
            const data = await res.json();
            return data.result;
        }

        // "id" below is aliased to the product's slug, so the rest of the page's
        // logic (links, cart, filtering) can keep working exactly as before.
        const PRODUCTS_QUERY = `*[_type == "product"] | order(_createdAt desc){
            "id": slug.current,
            name,
            brand,
            category,
            price,
            oldPrice,
            "images": images[].asset->url,
            isNew
        }`;

        let products = [];
        let cartCount = 0;

        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '<p class="col-span-full text-center text-sm text-gray-400 py-16">Loading products…</p>';
            try {
                products = await sanityFetch(PRODUCTS_QUERY);
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<p class="col-span-full text-center text-sm text-red-500 py-16">Could not load products from Sanity. Please check your connection and try again.</p>';
                return;
            }
            renderGrid();
        }

        // ---- CART HELPERS (localStorage) ----
        function getCart() { return JSON.parse(localStorage.getItem('aura_cart') || '[]'); }
        function saveCart(cart) { localStorage.setItem('aura_cart', JSON.stringify(cart)); }
        function updateBadge() {
            const total = getCart().reduce((sum,i) => sum + i.qty, 0);
            document.querySelectorAll('.cart-counter-badge').forEach(el => el.textContent = total);
        }

        function renderGrid() {
            const filterCat = document.getElementById('category-filter').value;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            const filtered = products.filter(p => filterCat === 'all' || p.category === filterCat);
            
            filtered.forEach(p => {
                const disc = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : null;
                const card = document.createElement('div');
                card.className = 'group relative bg-[#F9F9F9] cursor-pointer transition-shadow hover:shadow-lg rounded-sm overflow-hidden flex flex-col h-full';
                
                card.innerHTML = `
                    <a href="product-detail.html?id=${p.id}" class="flex flex-col h-full">
                        ${disc ? `<div class="absolute top-2 left-2 bg-accent text-white text-[9px] font-bold px-2 py-0.5 rounded-full z-10">-${disc}%</div>` : ''}
                        ${p.isNew ? `<div class="absolute top-2 right-2 bg-black text-white text-[9px] font-bold px-2 py-0.5 rounded-full z-10">NEW</div>` : ''}
                        
                        <div class="relative overflow-hidden bg-[#F9F9F9] h-[160px] md:h-[220px] shrink-0 w-full">
                            <img src="${p.images[0]}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        
                        <div class="p-3 pb-12 flex flex-col flex-1 items-center text-center">
                            <p class="text-[9px] text-gray-400 font-semibold uppercase tracking-widest mb-0.5">${p.brand}</p>
                            <h3 class="text-[10px] md:text-[11px] font-bold uppercase tracking-wide text-black mb-1 w-full line-clamp-2 px-1 leading-snug">${p.name}</h3>
                            <div class="flex items-center space-x-1 md:space-x-2 mt-auto text-xs w-full justify-center pt-2">
                                <span class="font-bold text-black">Rs.${p.price.toLocaleString()}</span>
                                ${p.oldPrice ? `<span class="text-gray-400 line-through text-[10px]">Rs.${p.oldPrice.toLocaleString()}</span>` : ''}
                            </div>
                        </div>
                    </a>
                    
                    <button onclick="addToCart(event, '${p.id}')" class="absolute bottom-3 right-3 w-8 h-8 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-black hover:text-white hover:border-black transition-all shadow-sm z-20">
                        <i class="fas fa-shopping-bag text-[11px]"></i>
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(e, productId) {
            e.preventDefault();
            e.stopPropagation();
            const product = products.find(p => p.id === productId);
            if (!product) return;
            const cart = getCart();
            const existing = cart.find(i => i.id === productId);
            if (existing) { existing.qty++; } 
            else { cart.push({ id: product.id, name: product.name, brand: product.brand, price: product.price, image: product.images[0], qty: 1 }); }
            saveCart(cart);
            updateBadge();
            
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(16px)';
            }, 2500);
        }

        // Link cart button to checkout
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateBadge();
            document.querySelectorAll('button.relative').forEach(btn => {
                if (btn.querySelector('.cart-counter-badge')) {
                    btn.addEventListener('click', () => window.location.href = 'checkout.html');
                }
            });
        });
    </script>
</body>
